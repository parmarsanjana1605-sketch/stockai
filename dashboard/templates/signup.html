<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up - StockAI</title>

{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link rel="icon" href="{% static 'favicon.ico' %}">

<style>

/* Layout */
.container { display: flex; height: 100vh; }

/* LEFT */
.left {
    flex: 1;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
}
.overlay { color: white; text-align: center; }
.overlay span { color: #00c9a7; }

/* RIGHT */
.right {
    flex: 1;
    background: #0b0b0b;
    padding: 60px;
    color: white;
}

/* Inputs */
.input-box { position: relative; margin: 15px 0; }

.input-box input {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid #444;
    border-radius: 8px;
    color: white;
}

.input-box label {
    position: absolute;
    top: 50%;
    left: 12px;
    transform: translateY(-50%);
    color: #aaa;
    transition: 0.3s;
}

.input-box input:focus + label,
.input-box input:valid + label {
    top: -8px;
    font-size: 12px;
    background: #0b0b0b;
}

/* Checkbox */
.checkbox { margin: 10px 0; }

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #00c9a7;
    border: none;
    border-radius: 8px;
    color: white;
}

/* Messages */
.error { color: red; }
.success { color: lightgreen; }
.match { font-size: 13px; }

</style>

</head>

<body class="signup-body">

<div class="container">

<!-- LEFT -->
<div class="left" >
    <div class="overlay">
        <h1>Welcome to <span>StockAI</span></h1>
        <p>Let’s start your stock journey 🚀</p>
    </div>
</div>

<!-- RIGHT -->
<div class="right">

<h2>Sign up</h2>

<!-- Django Messages -->
{% if error %}
    <div class="error">{{ error }}</div>
{% endif %}

{% if success %}
    <div class="success">{{ success }}</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="input-box">
    <input type="text" name="username" required>
    <label>Username</label>
</div>

<div class="input-box">
    <input type="email" name="email" required>
    <label>Email</label>
</div>

<div class="input-box">
    <input type="password" id="pass1" name="password1" required>
    <label>Password</label>
</div>

<div class="input-box">
    <input type="password" id="pass2" name="password2" required onkeyup="checkPassword()">
    <label>Confirm Password</label>
</div>

<!-- LIVE MATCH MESSAGE -->
<div id="message" class="match"></div>

<div class="checkbox">
    <input type="checkbox" required>
    <span>I agree to Terms & Privacy Policy</span>
</div>

<button type="submit">Create Account</button>

<p>Already have account? <a href="/login/">Login</a></p>

</form>

</div>
</div>

<!-- JS VALIDATION -->
<script>
function checkPassword() {
    let p1 = document.getElementById("pass1").value;
    let p2 = document.getElementById("pass2").value;
    let msg = document.getElementById("message");

    if (p2 === "") {
        msg.innerHTML = "";
    } else if (p1 === p2) {
        msg.style.color = "lightgreen";
        msg.innerHTML = "✔ Passwords match";
    } else {
        msg.style.color = "red";
        msg.innerHTML = "✖ Passwords do not match";
    }
}
</script>

</body>
</html>
