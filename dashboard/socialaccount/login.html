{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="google-login-page">

<div class="google-container">
    <h2>Sign In Via Google</h2>
    <p>You are about to sign in using Google</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Continue with Google</button>
    </form>
</div>

</body>
</html>
